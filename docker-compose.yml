version: '3.8'

services:
  horz-ds-bot:
    build: .
    container_name: horz-ds-bot
    restart: unless-stopped
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - BOT_INSTANCE_NAME=${BOT_INSTANCE_NAME:-horz-ds-bot-compose}
      - ENABLE_SINGLE_INSTANCE_LOCK=${ENABLE_SINGLE_INSTANCE_LOCK:-true}
      - ENABLE_WEB_ADMIN_PANEL=${ENABLE_WEB_ADMIN_PANEL:-true}
      - WEB_ADMIN_HOST=${WEB_ADMIN_HOST:-0.0.0.0}
      - WEB_ADMIN_PORT=${WEB_ADMIN_PORT:-8080}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    env_file:
      - .env
    ports:
      - "${WEB_ADMIN_PORT:-8080}:${WEB_ADMIN_PORT:-8080}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
